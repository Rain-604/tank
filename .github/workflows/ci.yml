name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libglew-dev freeglut3-dev libglu1-mesa-dev xvfb cppcheck

      - name: Build
        run: |
          cd tank/tank_assignment
          make -j$(nproc)

      - name: Static analysis
        run: |
          cd tank/tank_assignment
          cppcheck --enable=warning,performance,portability,style --suppress=missingIncludeSystem -I ../common --force . || true

      - name: Run headless
        run: |
          cd tank/tank_assignment
          xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' ./TankAssignment
        timeout-minutes: 10
